name: Build & Release

on:
  push:
    tags:
      - 'v*' # Trigger khi push tag dạng v1.0.0, v1.1.0, etc.

jobs:
  build:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write # 👈 QUAN TRỌNG: Cấp quyền dứt điểm cho TOKEN để tạo Release

    strategy:
      matrix:
        os: [macos-latest, windows-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      # Bỏ bước "Make distributables" vì nó bị lặp. 
      # Bước Publish bên dưới đã tự động tích hợp việc Make rồi!
      - name: Publish to GitHub Releases
        run: npx electron-forge publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
